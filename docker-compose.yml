version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DEMO_MODE=false
      - USE_NVIDIA=true
      - NIM_MODEL=nvidia/nemotron-3-super-120b-a12b
      - NIM_EMBED_MODEL=nvidia/nv-embedqa-mistral-v1
      - NVIDIA_API_KEY=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
      - CORS_ORIGINS=http://localhost:5173,http://localhost:3000
    volumes:
      - ./backend/knowledge:/app/knowledge
      - ./backend/data:/app/data
    restart: unless-stopped
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --timeout-keep-alive 600



  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped
